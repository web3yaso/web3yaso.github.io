<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sophie Huang</title>
<meta name="description" content="Sophie Huang — Building payment & compliance infra at the edge of the agent economy.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#f4f3ee">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    color: #3b3f4e;
    background: #f4f3ee;
    min-height: 100vh;
  }
  a { color: #5a4b85; }
  a:hover { color: #6f5f9c; }
  .serif { font-family: Georgia, 'Songti SC', 'Noto Serif SC', serif; }

  @keyframes reflectDrift {
    0%   { transform: translateX(-40%) skewX(-10deg); }
    100% { transform: translateX(140%) skewX(-10deg); }
  }

  /* ===== Nav ===== */
  nav {
    position: sticky; top: 0; z-index: 30;
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 22px 7vw 18px;
    border-bottom: 1px solid rgba(59,63,78,.14);
    background: rgba(244,243,238,.88);
    backdrop-filter: blur(8px);
  }
  .nav-brand {
    font-family: Georgia, 'Songti SC', 'Noto Serif SC', serif;
    font-size: 17px; letter-spacing: 0.06em;
    text-decoration: none; color: #3b3f4e;
  }
  .nav-links { display: flex; gap: 30px; font-size: 14px; align-items: baseline; flex-wrap: wrap; }
  .nav-links a { text-decoration: none; color: #3b3f4e; }
  .nav-links a:hover { color: #5a4b85; }
  .lang-btn {
    background: none; border: none; font-size: 14px; cursor: pointer;
    color: #3b3f4e; text-decoration: underline; text-underline-offset: 3px;
    font-family: inherit;
  }

  /* ===== Hero ===== */
  header {
    position: relative; overflow: hidden; padding-bottom: 40px;
    background: linear-gradient(180deg, #f7f6f1 0%, #eef0f5 100%);
  }
  .kicker {
    position: relative; z-index: 5; text-align: center;
    font-size: 13px; letter-spacing: 0.18em; color: #787d90;
    padding: 6vh 6vw 0;
  }
  .kicker b { color: #6f5f9c; font-weight: 600; }
  .stage {
    position: relative; z-index: 2;
    width: min(920px, 94vw); height: 500px; margin: 10px auto 0;
  }
  .stage-blob {
    position: absolute; border-radius: 50%;
    width: 460px; height: 460px; filter: blur(10px); pointer-events: none;
  }
  .stage-tag {
    position: absolute; z-index: 4; font-size: 14px; line-height: 1.5;
    transform: translate(-50%, -50%); text-align: center; width: 200px;
    opacity: 0; transition: opacity .35s ease; pointer-events: none;
  }
  .stage-tag b { display: block; font-size: 15px; font-weight: 600; }
  .stage-tag small { color: #787d90; font-size: 13px; }
  .stage-name {
    position: absolute; z-index: 4; left: 50%; top: 47%;
    transform: translate(-50%, -50%); text-align: center; width: 100%;
    opacity: 1; transition: opacity .35s ease;
  }
  .stage.is-hover .stage-tag { opacity: 1; }
  .stage.is-hover .stage-name { opacity: 0; }
  .stage-name h1 {
    font-family: Georgia, 'Songti SC', 'Noto Serif SC', serif;
    font-weight: 500; color: #2f3344;
    font-size: clamp(56px, 8vw, 104px); line-height: 1.04; letter-spacing: -0.01em;
  }
  .stage-role {
    font-weight: 500; font-size: clamp(18px, 2.1vw, 24px);
    color: #5a4b85; letter-spacing: 0.05em; margin-top: 18px;
  }
  .hero-intro {
    position: relative; z-index: 3; text-align: center;
    padding: 26px 7vw 20px; max-width: 1180px; margin: 0 auto;
  }
  .hero-intro p {
    font-size: 16.5px; line-height: 2.05; color: #5a5f72;
    max-width: 800px; margin: 0 auto 20px;
  }
  .hero-intro em {
    font-style: normal;
    background: linear-gradient(transparent 60%, rgba(190,175,221,.55) 60%);
  }
  .facts { display: flex; flex-wrap: nowrap; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; }
  .fact {
    padding: 6px 14px; border-radius: 999px;
    border: 1px solid rgba(59,63,78,.16); background: rgba(250,249,246,.5);
    font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: #787d90; white-space: nowrap;
  }
  .cta-row { display: flex; gap: 24px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    padding: 15px 34px; border-radius: 999px;
    background: linear-gradient(180deg, #8878b4, #6f5f9c);
    color: #f7f6f1; font-size: 15px; font-weight: 500; text-decoration: none;
    box-shadow: 0 8px 24px rgba(111,95,156,.22); transition: all .25s ease;
  }
  .btn-primary:hover {
    background: linear-gradient(180deg, #9a8cc4, #7b6aa8);
    box-shadow: 0 12px 34px rgba(139,125,184,.4), 0 0 0 4px rgba(139,125,184,.12);
    transform: translateY(-1px); color: #f7f6f1;
  }
  .btn-ghost {
    padding: 13px 26px; border-radius: 999px; background: transparent;
    border: 1px solid rgba(111,95,156,.35); color: #5a4b85;
    font-size: 15px; text-decoration: none; transition: all .25s ease;
  }
  .btn-ghost:hover {
    background: rgba(139,125,184,.1);
    box-shadow: 0 0 0 4px rgba(139,125,184,.12), 0 8px 22px rgba(139,125,184,.2);
    border-color: rgba(111,95,156,.55); color: #5a4b85;
  }

  /* ===== Sections ===== */
  section { position: relative; overflow: hidden; padding: 90px 7vw; }
  .section-head { max-width: 1100px; margin: 0 auto 50px; }
  .section-label {
    font-size: 13px; letter-spacing: 0.22em; color: #787d90;
    text-transform: uppercase; margin-bottom: 14px;
  }
  .section-title {
    font-family: Georgia, 'Songti SC', 'Noto Serif SC', serif;
    font-weight: 500; font-size: clamp(30px, 3.6vw, 44px); color: #2f3344;
  }
  .divider {
    width: 54px; height: 3px; margin-top: 20px; border-radius: 2px;
    background: linear-gradient(90deg, #8fa9c4, #a795c9, #9cb894);
  }
  .glow {
    position: absolute; z-index: -1; pointer-events: none;
    border-radius: 50%; filter: blur(90px);
  }

  /* ===== What I build ===== */
  #build { background: linear-gradient(180deg, #f2f2ee 0%, #edeef1 100%); }
  .pillars { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
  .pillar {
    background: #faf9f6; border: 1px solid rgba(59,63,78,.12); border-radius: 16px;
    padding: 30px 28px; box-shadow: 0 8px 30px rgba(90,75,133,.06);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .pillar:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(90,75,133,.12); }
  .pillar-dot { width: 34px; height: 34px; border-radius: 50%; margin-bottom: 20px; filter: blur(1px); }
  .pillar h3 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .pillar p { font-size: 15px; line-height: 1.95; color: #5a5f72; }

  /* ===== Selected work ===== */
  #work { background: #e8eaef; }
  .cards { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .card {
    background: #faf9f6; border: 1px solid rgba(59,63,78,.12); border-radius: 16px;
    padding: 32px 30px; text-decoration: none; display: block;
    box-shadow: 0 8px 30px rgba(90,75,133,.06);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 18px 44px rgba(90,75,133,.14); }
  .card-meta { font-size: 12.5px; letter-spacing: 0.1em; color: #6f5f9c; margin-bottom: 12px; text-transform: uppercase; }
  .card-title-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .card-title-group { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .card h3 { font-family: Georgia, 'Songti SC', 'Noto Serif SC', serif; font-size: 21px; font-weight: 600; color: #2f3344; }
  .card-wip {
    font-size: 11px; letter-spacing: 0.06em; font-weight: 500;
    padding: 3px 10px; border-radius: 999px;
    color: #8a7b3d; background: #f6f0da; border: 1px solid #e2d6a8;
    white-space: nowrap; transform: translateY(-1px);
  }
  .card-arrow { color: #6f5f9c; font-size: 15px; }
  .card p { font-size: 15px; line-height: 1.95; color: #5a5f72; }
  .card-bullets { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .card-bullets li {
    position: relative; padding-left: 20px;
    font-size: 14.5px; line-height: 1.65; color: #5a5f72;
  }
  .card-bullets li::before {
    content: ""; position: absolute; left: 3px; top: 9px;
    width: 5px; height: 5px; border-radius: 50%;
    background: linear-gradient(135deg, #a795c9, #8fa9c4);
  }
  .card-star { color: #787d90; font-size: 13.5px; margin-top: 12px; }

  /* ===== Experience ===== */
  #experience { background: #eef0f2; }
  .timeline-wrap { max-width: 1100px; margin: 0 auto; }
  .timeline { position: relative; padding-left: 34px; max-width: 760px; }
  .timeline-line {
    position: absolute; left: 8px; top: 6px; bottom: 6px; width: 2px;
    background: linear-gradient(#a795c9, #8fa9c4 55%, #9cb894); border-radius: 2px;
  }
  .timeline-item { position: relative; padding-bottom: 44px; }
  .timeline-dot {
    position: absolute; left: -33px; top: 7px; width: 12px; height: 12px;
    border-radius: 50%; background: #6f5f9c; border: 3px solid #f4f3ee;
  }
  .timeline-dot.current {
    background: #2f9e63; box-shadow: 0 0 0 4px rgba(47,158,99,.18);
  }
  .timeline-period { font-size: 13px; letter-spacing: 0.08em; color: #787d90; margin-bottom: 6px; }
  .timeline-item h3 { font-size: 17.5px; font-weight: 600; margin-bottom: 8px; }
  .timeline-item h3 span { color: #787d90; font-weight: 400; }
  .timeline-item p { font-size: 15px; line-height: 1.95; color: #5a5f72; }
  .timeline-bullets { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .timeline-bullets li {
    position: relative; padding-left: 18px;
    font-size: 14.5px; line-height: 1.65; color: #5a5f72;
  }
  .timeline-bullets li::before {
    content: ""; position: absolute; left: 2px; top: 9px;
    width: 5px; height: 5px; border-radius: 50%;
    background: linear-gradient(135deg, #a795c9, #8fa9c4);
  }

  /* ===== Stack ===== */
  #stack { background: #e6e8ee; }
  .stack-wrap { max-width: 1100px; margin: 0 auto; }
  .chips { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 44px; }
  .chip {
    padding: 9px 18px; border-radius: 999px; font-size: 14px;
    background: #faf9f6; border: 1px solid rgba(59,63,78,.14); color: #5a5f72;
  }
  .chip.hl { border: 1px solid #b0a6c9; color: #5a4b85; background: #f1eef7; }
  .edu { margin-top: 20px; padding-top: 40px; border-top: 1px solid rgba(59,63,78,.12); max-width: 760px; }
  .edu h3 {
    font-size: 15px; letter-spacing: 0.1em; color: #787d90;
    text-transform: uppercase; margin-bottom: 18px;
  }
  .edu-list { display: flex; flex-direction: column; gap: 24px; max-width: 760px; }
  .edu-item h4 { font-size: 16.5px; font-weight: 600; color: #2f3344; margin-bottom: 6px; }
  .edu-item .edu-degree { font-size: 15px; color: #5a5f72; line-height: 1.7; }
  .edu-item .edu-meta { font-size: 13px; color: #787d90; margin-top: 6px; letter-spacing: 0.02em; }

  /* ===== Writing ===== */
  #writing { background: linear-gradient(180deg, #ebe8f0 0%, #e4e7ee 100%); }
  .posts { max-width: 900px; margin: 0 auto; border-bottom: 1px solid rgba(59,63,78,.12); }
  .post {
    display: grid; grid-template-columns: 150px 1fr; gap: 30px; align-items: baseline;
    padding: 28px 6px; border-top: 1px solid rgba(59,63,78,.12);
    text-decoration: none; color: inherit; transition: background .2s ease;
  }
  .post:hover { background: rgba(250,249,246,.7); color: inherit; }
  .post-date { font-size: 13px; letter-spacing: 0.06em; color: #787d90; }
  .post-tag { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #6f5f9c; margin-top: 6px; }
  .post h3 {
    font-family: Georgia, 'Songti SC', 'Noto Serif SC', serif;
    font-size: 20px; font-weight: 600; color: #2f3344; margin-bottom: 8px;
  }
  .post p { font-size: 15px; line-height: 1.9; color: #5a5f72; }

  /* ===== Contact ===== */
  #contact {
    text-align: center; padding: 90px 7vw 60px;
    background: linear-gradient(180deg, #e1e3ec 0%, #d8dae4 100%);
  }
  .reflect {
    position: absolute; z-index: 0; pointer-events: none;
    top: 0; bottom: 0; width: 55%; left: 0;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.5), transparent);
    opacity: .5; animation: reflectDrift 22s linear infinite;
  }
  .contact-inner { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }
  .contact-inner .divider { margin: -6px auto 22px; }
  .contact-lede { font-size: 16.5px; line-height: 2; color: #5a5f72; margin-bottom: 34px; }
  .contact-links { display: flex; gap: 26px; justify-content: center; flex-wrap: wrap; margin-bottom: 44px; }
  .antiphish {
    text-align: left; background: #faf9f6;
    border: 1px solid rgba(59,63,78,.14); border-left: 3px solid #6f5f9c;
    border-radius: 10px; padding: 20px 24px;
    font-size: 13.5px; line-height: 1.95; color: #787d90;
  }
  .antiphish b { color: #3b3f4e; }

  footer {
    padding: 26px 7vw 40px; text-align: center;
    font-size: 13px; color: #5a5f72; background: #cdd0da;
    border-top: 1px solid rgba(59,63,78,.16);
  }

  /* ===== Responsive ===== */
  @media (max-width: 860px) {
    .pillars { grid-template-columns: 1fr; }
    .cards { grid-template-columns: 1fr; }
    .stage { height: 380px; }
    .nav-links { gap: 18px; }
    .facts { flex-wrap: wrap; }
  }
  @media (max-width: 560px) {
    .post { grid-template-columns: 1fr; gap: 8px; }
    .facts .fact { white-space: normal; }
  }
</style>
</head>
<body>

  <!-- ===== Nav ===== -->
  <nav>
    <a href="#top" class="nav-brand" id="brand"></a>

  <!-- ===== What I build ===== -->

  <!-- ===== Experience ===== -->
  <section id="experience">

      <div class="section-label">Experience</div>

    <div class="timeline-wrap">
      <div class="timeline">
        <div class="timeline-line"></div>

      <div class="edu">

  <!-- ===== Stack ===== -->
  <section id="stack">

      <div class="section-label">Stack</div>

  <!-- ===== Writing (temporarily hidden) ===== -->

<script>
// ===================================================================
// CONTENT — this is the "CMS" surface. Edit these values directly.
// Every {zh, en} pair is a bilingual field. Arrays add/remove items.
// ===================================================================
const content = {
  brand: "Sophie Huang",
  githubUrl: "https://github.com/web3yaso",
  showAvailability: true,
  nav: [
    { href: "#build", label: { zh: "核心能力", en: "Capabilities" } },
    { href: "#work", label: { zh: "作品", en: "Work" } },

    { href: "#stack", label: { zh: "技术栈", en: "Stack" } },
    { href: "#contact", label: { zh: "联系", en: "Contact" } }
  ],
  hero: {
    name: "Sophie Huang",
    role: { zh: "为 AI agent 造支付与合规基础设施", en: "Building payment & compliance infra at the edge of the agent economy" },
    kickerLead: { zh: "正在寻找新机会", en: "Open to new opportunities" },
    kickerRest: { zh: "AGENT PAYMENTS · STABLECOIN INFRA · WEB3 COMPLIANCE", en: "AGENT PAYMENTS · STABLECOIN INFRA · WEB3 COMPLIANCE" },
    tags: [
      { title: { zh: "Agency", en: "Agency" }, sub: { zh: "想到就去做", en: "just build it" } },
      { title: { zh: "Distribution", en: "Distribution" }, sub: { zh: "让东西被看见", en: "make it seen" } },
      { title: { zh: "Taste", en: "Taste" }, sub: { zh: "对产品有审美", en: "an eye for product" } }
    ],

// ===================================================================
// Rendering — no need to touch anything below to edit content.
// ===================================================================
let lang = (function () {
  let l = null;
  try {
    l = new URLSearchParams(location.search).get("lang") || localStorage.getItem("lang");
  } catch (e) {}
  if (!l) {
    l = (navigator.language || "").toLowerCase().indexOf("zh") === 0 ? "zh" : "en";
  }
  return (l === "zh" || l === "en") ? l : "zh";
})();

function t(v) {
  return (v && typeof v === "object" && !Array.isArray(v)) ? (v[lang] ?? v.en ?? v.zh ?? "") : v;
}

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text != null) node.textContent = text;
  return node;
}

function setText(id, value) {
  document.getElementById(id).textContent = value;
}

function render() {
  document.documentElement.lang = lang === "zh" ? "zh" : "en";
  const c = content, h = c.hero;

  setText("brand", c.brand);
  setText("lang-toggle", lang === "zh" ? "EN" : "中文");

  // Nav links
  const navBox = document.getElementById("nav-items");
  navBox.innerHTML = "";
  c.nav.forEach((n) => {
    const a = el("a", null, t(n.label));
    a.href = n.href;
    navBox.appendChild(a);
  });

  // Kicker
  const kicker = document.getElementById("kicker");
  kicker.innerHTML = "";
  if (c.showAvailability) {
    kicker.appendChild(el("b", null, "● " + t(h.kickerLead)));
    kicker.appendChild(document.createTextNode(" — "));
  }
  kicker.appendChild(document.createTextNode(t(h.kickerRest)));

  // Hero
  setText("hero-name", h.name);
  setText("hero-role", t(h.role));
  setText("tagA-title", t(h.tags[0].title)); setText("tagA-sub", t(h.tags[0].sub));
  setText("tagB-title", t(h.tags[1].title)); setText("tagB-sub", t(h.tags[1].sub));
  setText("tagC-title", t(h.tags[2].title)); setText("tagC-sub", t(h.tags[2].sub));
  setText("self-pre", t(h.selfPre));
  setText("self-under", t(h.selfUnder));
  setText("self-post", t(h.selfPost));
  setText("fact1", t(h.fact1)); setText("fact2", t(h.fact2)); setText("fact3", t(h.fact3));
  setText("cta-work", t(h.ctaWork));
  setText("cta-email", t(h.ctaEmail));
  document.getElementById("cta-github").href = c.githubUrl;

  // What I build
  setText("build-title", t(c.buildTitle));
  const pillarsBox = document.getElementById("pillars");
  pillarsBox.innerHTML = "";
  c.pillars.forEach((p) => {
    const div = el("div", "pillar");
    const dot = el("div", "pillar-dot");
    dot.style.background = p.dot;
    const h3 = el("h3", null, t(p.title));
    h3.style.color = p.color;
    div.append(dot, h3, el("p", null, t(p.body)));
    pillarsBox.appendChild(div);
  });

  // Selected work
  setText("work-title", t(c.workTitle));
  const cardsBox = document.getElementById("cards");
  cardsBox.innerHTML = "";
  c.cards.forEach((card) => {
    const a = el("a", "card");
    a.href = card.href;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.appendChild(el("div", "card-meta", card.meta));
    const row = el("div", "card-title-row");
    const titleGroup = el("div", "card-title-group");
    titleGroup.appendChild(el("h3", null, t(card.title)));
    if (card.wip) titleGroup.appendChild(el("span", "card-wip", t(card.wip)));
    row.append(titleGroup, el("span", "card-arrow", card.arrow));
    a.appendChild(row);
    const ul = el("ul", "card-bullets");
    card.bullets.forEach((b) => ul.appendChild(el("li", null, t(b))));
    a.appendChild(ul);
    if (card.star) a.appendChild(el("div", "card-star", "★ " + card.star));
    cardsBox.appendChild(a);
  });

  // Experience
  setText("exp-title", t(c.expTitle));
  const timelineBox = document.getElementById("timeline-items");
  timelineBox.innerHTML = "";
  c.experience.forEach((item) => {
    const div = el("div", "timeline-item");
    div.appendChild(el("div", "timeline-dot" + (item.current ? " current" : "")));
    div.appendChild(el("div", "timeline-period", t(item.period)));
    const h3 = el("h3", null, item.org + " ");
    h3.appendChild(el("span", null, "· " + t(item.role)));
    div.appendChild(h3);
    if (item.bullets) {
      const ul = el("ul", "timeline-bullets");
      item.bullets.forEach((b) => ul.appendChild(el("li", null, t(b))));
      div.appendChild(ul);
    } else if (item.body) {
      div.appendChild(el("p", null, t(item.body)));
    }
    timelineBox.appendChild(div);
  });

  // Stack
  setText("stack-title", t(c.stackTitle));
  const chipsBox = document.getElementById("chips");
  chipsBox.innerHTML = "";
  c.chipsHl.forEach((chip) => chipsBox.appendChild(el("span", "chip hl", t(chip))));
  c.chipsNormal.forEach((chip) => chipsBox.appendChild(el("span", "chip", t(chip))));
  setText("edu-title", t(c.eduTitle));
  const eduBox = document.getElementById("edu-list");
  eduBox.innerHTML = "";
  c.education.forEach((e) => {
    const item = el("div", "edu-item");
    item.append(
      el("h4", null, t(e.school)),
      el("div", "edu-degree", t(e.degree)),
      el("div", "edu-meta", t(e.meta))
    );
    eduBox.appendChild(item);
  });

  // Writing
  setText("writing-title", t(c.writingTitle));
  const postsBox = document.getElementById("posts");
  postsBox.innerHTML = "";
  c.writing.forEach((post) => {
    const a = el("a", "post");
    a.href = post.href;
    const left = el("div");
    left.append(el("div", "post-date", post.date), el("div", "post-tag", post.tag));
    const right = el("div");
    right.append(el("h3", null, t(post.title)), el("p", null, t(post.blurb)));
    a.append(left, right);
    postsBox.appendChild(a);
  });

  // Contact
  setText("contact-title", t(c.contactTitle));
  setText("contact-lede", t(c.contactLede));
  const linksBox = document.getElementById("contact-link-items");
  linksBox.innerHTML = "";
  c.contactLinks.forEach((link) => {
    const a = el("a", "btn-ghost", t(link.label));
    a.href = link.href;
    a.rel = "noopener noreferrer";
    linksBox.appendChild(a);
  });
  setText("antiphish-label", t(c.antiphishLabel));
  setText("antiphish-body", t(c.antiphishBody));

  setText("footer", t(c.footerText));
}

document.getElementById("lang-toggle").addEventListener("click", () => {
  lang = lang === "zh" ? "en" : "zh";
  try { localStorage.setItem("lang", lang); } catch (e) {}
  render();
});

const stage = document.getElementById("stage");
stage.addEventListener("mouseenter", () => stage.classList.add("is-hover"));
stage.addEventListener("mouseleave", () => stage.classList.remove("is-hover"));

render();
</script>
